<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Incident Ops</title>
    <link rel="stylesheet" href="./src/styles/app.css">
    <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime/uno.global.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/vue3-sfc-loader/dist/vue3-sfc-loader.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script src="./src/data.js"></script>
    <script>
      const { loadModule } = window['vue3-sfc-loader'];
      const options = {
        moduleCache: { vue: Vue },
        async getFile(url) {
          const response = await fetch(url);
          if (!response.ok) {
            throw Object.assign(new Error(url + ' ' + response.statusText), { response });
          }
          return await response.text();
        },
        addStyle(textContent) {
          const style = document.createElement('style');
          style.textContent = textContent;
          document.head.appendChild(style);
        },
      };
      Vue.createApp({
        components: {
          App: Vue.defineAsyncComponent(() => loadModule('/src/App.vue', options)),
        },
        template: '<App />',
      }).mount('#app');
    </script>
  </body>
</html>
